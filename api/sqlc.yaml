version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        # sqlc's English-singular inflection heuristic turns the
        # `media` table into a `Medium` Go struct, which reads
        # bizarrely throughout the codebase. Override to `Media`.
        rename:
          medium: "Media"
