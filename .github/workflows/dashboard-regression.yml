name: Dashboard Regression

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DASHBOARD_BASE_URL: https://dev-app.unipost.dev
      DASHBOARD_TEST_EMAIL: ${{ secrets.DASHBOARD_TEST_EMAIL }}
      DASHBOARD_TEST_PROFILE_ID: ${{ vars.DASHBOARD_TEST_PROFILE_ID }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_DEVELOPMENT_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browser
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run dashboard regression
        working-directory: dashboard
        run: npm run test:regression:dashboard

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-regression-playwright-report
          path: dashboard/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-regression-test-results
          path: dashboard/test-results
          if-no-files-found: ignore

  notify:
    runs-on: ubuntu-latest
    needs: dashboard
    if: always() && needs.dashboard.result != 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare scripts
        run: chmod +x scripts/regression/send-alert.sh

      - name: Send failure alert
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.REGRESSION_ALERT_WEBHOOK_URL }}
          BASE_URL: ${{ vars.DASHBOARD_BASE_URL || 'https://app.unipost.dev' }}
          FAILED_SUITES: dashboard=${{ needs.dashboard.result }}
        run: scripts/regression/send-alert.sh
