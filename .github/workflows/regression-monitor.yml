name: Regression Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Prepare scripts
        run: chmod +x scripts/smoke-test.sh scripts/regression/run-suite.sh scripts/sdk-published-regression/run-suite.sh

      - name: Run smoke regression
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/regression
        run: scripts/regression/run-suite.sh smoke

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-smoke-log
          path: artifacts/regression/smoke.log
          if-no-files-found: warn

  sdk_js:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare scripts
        run: chmod +x scripts/regression/run-suite.sh scripts/sdk-published-regression/run-suite.sh

      - name: Run JavaScript SDK regression
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/regression
        run: scripts/regression/run-suite.sh sdk-js

      - name: Upload JavaScript SDK log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-sdk-js-log
          path: artifacts/regression/sdk-js.log
          if-no-files-found: warn

  sdk_python:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare scripts
        run: chmod +x scripts/regression/run-suite.sh scripts/sdk-published-regression/run-suite.sh

      - name: Run Python SDK regression
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/regression
        run: scripts/regression/run-suite.sh sdk-python

      - name: Upload Python SDK log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-sdk-python-log
          path: artifacts/regression/sdk-python.log
          if-no-files-found: warn

  sdk_go:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: scripts/sdk-validation/go/go.mod

      - name: Prepare scripts
        run: chmod +x scripts/regression/run-suite.sh scripts/sdk-published-regression/run-suite.sh

      - name: Run Go SDK regression
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/regression
        run: scripts/regression/run-suite.sh sdk-go

      - name: Upload Go SDK log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-sdk-go-log
          path: artifacts/regression/sdk-go.log
          if-no-files-found: warn

  sdk_java:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Prepare scripts
        run: chmod +x scripts/regression/run-suite.sh scripts/sdk-published-regression/run-suite.sh scripts/sdk-validation/java/gradlew

      - name: Run Java SDK regression
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/regression
          JAVA_SDK_VERSION: 0.2.7
        run: scripts/regression/run-suite.sh sdk-java

      - name: Upload Java SDK log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-sdk-java-log
          path: artifacts/regression/sdk-java.log
          if-no-files-found: warn

  notify:
    runs-on: ubuntu-latest
    needs:
      - smoke
      - sdk_js
      - sdk_python
      - sdk_go
      - sdk_java
    if: always() && (needs.smoke.result != 'success' || needs.sdk_js.result != 'success' || needs.sdk_python.result != 'success' || needs.sdk_go.result != 'success' || needs.sdk_java.result != 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Prepare scripts
        run: chmod +x scripts/regression/send-alert.sh

      - name: Send failure alert
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.REGRESSION_ALERT_WEBHOOK_URL }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          FAILED_SUITES: >-
            smoke=${{ needs.smoke.result }},
            sdk_js=${{ needs.sdk_js.result }},
            sdk_python=${{ needs.sdk_python.result }},
            sdk_go=${{ needs.sdk_go.result }},
            sdk_java=${{ needs.sdk_java.result }}
        run: scripts/regression/send-alert.sh
