name: SDK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.2.1"
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/sdk-validation/js/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version-file: scripts/sdk-validation/go/go.mod

      - name: Prepare scripts
        run: chmod +x scripts/regression/run-suite.sh

      - name: Validate JavaScript SDK
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/sdk-release
        run: scripts/regression/run-suite.sh sdk-js

      - name: Validate Python SDK
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/sdk-release
        run: scripts/regression/run-suite.sh sdk-python

      - name: Validate Go SDK
        env:
          UNIPOST_API_KEY: ${{ secrets.UNIPOST_REGRESSION_API_KEY }}
          TEST_ACCOUNT_ID: ${{ secrets.REGRESSION_TEST_ACCOUNT_ID }}
          BASE_URL: ${{ vars.UNIPOST_API_BASE_URL }}
          LOG_DIR: ${{ github.workspace }}/artifacts/sdk-release
        run: scripts/regression/run-suite.sh sdk-go

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-release-validation-logs
          path: artifacts/sdk-release/
          if-no-files-found: warn

  publish_js:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish JavaScript SDK to npm
        working-directory: sdk/javascript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish_python:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build Python SDK
        working-directory: sdk/python
        run: python -m build

      - name: Publish Python SDK to PyPI
        working-directory: sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
